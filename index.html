<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#0984e3">
<title>Controle ULTRA de Compras</title>

<link rel="manifest" href="manifest.json">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f1f2f6; padding:20px;}
h1 { text-align:center; }

.topo { display:flex; justify-content:space-between; margin-bottom:10px;}

table { width:100%; border-collapse: collapse; background:white;}
th, td { border:1px solid #ddd; padding:8px; text-align:center;}
th { background:#2d3436; color:white;}

input { width:95%; border:none; text-align:center;}
button { padding:8px; border:none; background:#0984e3; color:white; border-radius:5px;}

.total { text-align:right; font-size:18px; margin-top:10px;}
</style>
</head>

<body>

<h1>🛒 Controle ULTRA</h1>

<div class="topo">
<input type="month" id="mes">
<button onclick="add()">+ Produto</button>
<button onclick="exportar()">Exportar</button>
</div>

<table>
<thead>
<tr>
<th>Tipo</th><th>Produto</th><th>Marca</th><th>Qtd</th><th>Valor</th><th>Total</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div class="total">
💰 Total: R$ <span id="total">0.00</span>
</div>

<canvas id="grafico"></canvas>

<script type="module">

// 🔥 COLE AQUI SEU FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyC_UVQBs1GvcM4EO4O6fHrzQ2vqpSqkcPc",
  authDomain: "mercadopratico-738d6.firebaseapp.com",
  projectId: "mercadopratico-738d6",
};

// INIT
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let mes = new Date().toISOString().slice(0,7);
document.getElementById("mes").value = mes;

let lista = [];

const colRef = collection(db, "compras");

// 🔄 TEMPO REAL
onSnapshot(colRef, (snapshot) => {
  lista = [];
  snapshot.forEach(doc => {
    lista.push({ id: doc.id, ...doc.data() });
  });
  render();
});

function add() {
  addDoc(colRef, {
    tipo:"", produto:"", marca:"", qtd:1, valor:0, mes:mes
  });
}

window.update = async (id, campo, valor) => {
  await updateDoc(doc(db, "compras", id), {
    [campo]: campo=="qtd"||campo=="valor" ? parseFloat(valor) : valor
  });
};

function render() {
  let tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  let total = 0;
  let categorias = {};

  lista.filter(i => i.mes === mes).forEach(item => {
    let t = item.qtd * item.valor;
    total += t;

    if (!categorias[item.tipo]) categorias[item.tipo]=0;
    categorias[item.tipo]+=t;

    tbody.innerHTML += `
    <tr>
      <td><input value="${item.tipo}" onchange="update('${item.id}','tipo',this.value)"></td>
      <td><input value="${item.produto}" onchange="update('${item.id}','produto',this.value)"></td>
      <td><input value="${item.marca}" onchange="update('${item.id}','marca',this.value)"></td>
      <td><input value="${item.qtd}" onchange="update('${item.id}','qtd',this.value)"></td>
      <td><input value="${item.valor}" onchange="update('${item.id}','valor',this.value)"></td>
      <td>R$ ${t.toFixed(2)}</td>
    </tr>
    `;
  });

  document.getElementById("total").innerText = total.toFixed(2);
  grafico(categorias);
}

let chart;
function grafico(cat){
  let ctx = document.getElementById("grafico");
  if(chart) chart.destroy();
  chart = new Chart(ctx,{
    type:'pie',
    data:{ labels:Object.keys(cat), datasets:[{data:Object.values(cat)}]}
  });
}

function exportar(){
  let csv = "Tipo,Produto,Marca,Qtd,Valor,Total\n";
  lista.forEach(i=>{
    let t=i.qtd*i.valor;
    csv+=`${i.tipo},${i.produto},${i.marca},${i.qtd},${i.valor},${t}\n`;
  });

  let blob = new Blob([csv]);
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "compras.csv";
  a.click();
}

</script>

<script>
// 📱 PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
